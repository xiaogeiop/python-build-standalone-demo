name: Sync to Gitee

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Gitee
        uses: Yikun/hub-mirror-action@master
        with:
          src: github/xiaogeiop
          dst: gitee/guoyunfei
          # ✅ 添加 GitHub Token（使用 Actions 自动生成的 token）
          src_token: ${{ secrets.GITHUB_TOKEN }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          force_update: true
          static_list: "python-build-standalone"
          debug: true
