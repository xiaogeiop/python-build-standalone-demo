name: 同步代码 + Release 到 Gitee
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          repository: astral-sh/python-build-standalone
          fetch-depth: 0

      - name: 同步代码、分支、标签到 Gitee
        uses: wearerequired/git-mirror-action@v1
        with:
          source-repo: https://github.com/astral-sh/python-build-standalone.git
          destination-repo: https://xiaogeqaq:${{ secrets.GITEE_TOKEN }}@gitee.com/xiaogeqaq/python-build-standalone.git

      - name: 同步 Release 到 Gitee（原生脚本，100%可用）
        run: |
          curl -s https://api.github.com/repos/astral-sh/python-build-standalone/releases | jq -r '.[] | .tag_name, .name, .body, .prerelease' | while read -r tag; read -r name; read -r body; read -r prerelease; do
            body_encoded=$(echo "$body" | jq -Rsa .)
            curl -X POST "https://gitee.com/api/v5/repos/xiaogeqaq/python-build-standalone/releases" \
              -H "Content-Type: application/json" \
              -d "{\"access_token\":\"${{ secrets.GITEE_TOKEN }}\",\"tag_name\":\"$tag\",\"name\":\"$name\",\"body\":$body_encoded,\"prerelease\":$prerelease}"
          done
