name: Sync to Gitee (Token Only)

on:
  push:
    branches: [ "main", "master" ]
  # 可选：定时同步
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Gitee (Token only)
        uses: Yikun/hub-mirror-action@master
        with:
          # 你的 GitHub 用户名/组织名
          src: xiaogeiop
          # 你的 Gitee 用户名
          dst: guoyunfei
          # 只需配置 token，无需 dst_key
          dst_token: ${{ secrets.GITEE_TOKEN }}
          # 强制同步
          force_update: true
          # 要同步的仓库名（可选，不配置则同步所有）
          static_list: "https://github.com/astral-sh/python-build-standalone.git"
          debug: true
